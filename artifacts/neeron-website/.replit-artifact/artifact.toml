kind = "web"
previewPath = "/"
title = "Neeron - Premium Cleaning Solutions"
version = "1.0.0"
id = "artifacts/neeron-website"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 24546
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/neeron-website run dev"

[services.env]
PORT = "24546"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/neeron-website", "run", "build"]
publicDir = "artifacts/neeron-website/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
