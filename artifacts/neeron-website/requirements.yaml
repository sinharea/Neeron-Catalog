  - path: "artifacts/neeron-website/public/images/about-img.png"
    description: "A bright, sunlit modern bathroom showing pristine, sparkling clean white tiles, a small fresh green potted plant, and vibrant orange towels. Premium, clean, minimalist aesthetic with soft natural shadows."
    aspect_ratio: "4:3"
  - path: "artifacts/neeron-website/public/images/pattern-bg.png"
    description: "Abstract, minimalist geometric background pattern featuring soft, translucent gradients of fresh vibrant green and bright energetic orange on a clean white background. Subtle glassmorphism effects."
    aspect_ratio: "16:9"

notes:
  - Using generated API hooks from @workspace/api-client-react
  - Assuming the API runs on the same domain or through the provided proxy
